name: Deploy Supabase migrations

# Push migrations to the linked Supabase project whenever a merge to main
# touches supabase/migrations/**. Concurrency-guarded so a fast series of
# merges can't apply migrations in parallel and race the schema.
on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/deploy-migrations.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List pending migrations without applying"
        type: boolean
        default: false

concurrency:
  group: supabase-migrations-prod
  cancel-in-progress: false

jobs:
  push:
    name: supabase db push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Sanity check — required config
        run: |
          set -e
          [ -n "$SUPABASE_ACCESS_TOKEN" ] || { echo "::error::secret SUPABASE_ACCESS_TOKEN missing"; exit 1; }
          [ -n "$SUPABASE_DB_PASSWORD" ]  || { echo "::error::secret SUPABASE_DB_PASSWORD missing"; exit 1; }
          [ -n "$SUPABASE_PROJECT_ID" ]   || { echo "::error::variable SUPABASE_PROJECT_ID missing"; exit 1; }
          echo "Project: $SUPABASE_PROJECT_ID"
          ls -1 supabase/migrations | tail -5
          echo "Migration files in repo: $(ls supabase/migrations/*.sql | wc -l)"

      - name: Link to remote project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Show pending migrations
        run: supabase migration list

      - name: Push migrations (real run)
        if: ${{ github.event_name == 'push' || inputs.dry_run != true }}
        run: supabase db push --include-all
