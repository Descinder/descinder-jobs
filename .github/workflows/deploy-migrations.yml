name: Deploy Supabase migrations

# Push migrations to the linked Supabase project whenever a merge to main
# touches supabase/migrations/**. Concurrency-guarded so a fast series of
# merges can't apply migrations in parallel and race the schema.
on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/deploy-migrations.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List pending migrations without applying"
        type: boolean
        default: false

concurrency:
  group: supabase-migrations-prod
  cancel-in-progress: false

jobs:
  push:
    name: supabase db push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      # Prefer repo Variable; fall back to repo Secret so a mis-tabbed value
      # still works. Project ref is not sensitive (it's in the Supabase URL).
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID || secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_PROJECT_ID_FROM_VAR: ${{ vars.SUPABASE_PROJECT_ID }}
      SUPABASE_PROJECT_ID_FROM_SECRET_SET: ${{ secrets.SUPABASE_PROJECT_ID != '' && 'yes' || 'no' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Sanity check — required config
        run: |
          set -e
          [ -n "$SUPABASE_ACCESS_TOKEN" ] || { echo "::error::secret SUPABASE_ACCESS_TOKEN missing (Settings → Secrets and variables → Actions → Secrets tab)"; exit 1; }
          [ -n "$SUPABASE_DB_PASSWORD" ]  || { echo "::error::secret SUPABASE_DB_PASSWORD missing (Settings → Secrets and variables → Actions → Secrets tab)"; exit 1; }
          echo "SUPABASE_PROJECT_ID source: var='${SUPABASE_PROJECT_ID_FROM_VAR:-<empty>}' secret_set=$SUPABASE_PROJECT_ID_FROM_SECRET_SET"
          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::error::SUPABASE_PROJECT_ID not resolved."
            echo "::error::Add it under Settings → Secrets and variables → Actions → **Variables** tab (repo scope, NOT environment scope)."
            echo "::error::The project ref is the 20-char string in your Supabase dashboard URL (https://supabase.com/dashboard/project/<ref>)."
            exit 1
          fi
          echo "Project: $SUPABASE_PROJECT_ID"
          ls -1 supabase/migrations | tail -5
          echo "Migration files in repo: $(ls supabase/migrations/*.sql | wc -l)"

      - name: Link to remote project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Show pending migrations
        run: supabase migration list

      - name: Push migrations (real run)
        if: ${{ github.event_name == 'push' || inputs.dry_run != true }}
        run: supabase db push --include-all
